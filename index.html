<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agent-Ready Environment Tutorial</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            50: '#eef2ff',
                            100: '#e0e7ff',
                            500: '#6366f1',
                            600: '#4f46e5',
                            900: '#312e81',
                        }
                    },
                    fontFamily: {
                        sans: ['"Plus Jakarta Sans"', '"Noto Sans JP"', 'sans-serif'],
                        display: ['Outfit', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style type="text/tailwindcss">
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=Outfit:wght@400;600;700&family=Plus+Jakarta+Sans:wght@400;500;600&display=swap');
        
        body {
            @apply bg-slate-50 text-slate-800 antialiased selection:bg-brand-500 selection:text-white;
            /* Soft Modern Background */
            background-image: radial-gradient(circle at top right, #eef2ff, #fdf2f8, #f8fafc);
            background-attachment: fixed;
        }

        .glass-card {
            @apply bg-white/70 backdrop-blur-md border border-white/30 shadow-xl rounded-3xl;
        }

        .markdown-body {
            @apply pt-8 pb-16;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans JP", Helvetica, Arial, sans-serif, "Apple Color Emoji", "Segoe UI Emoji";
            font-size: 16px;
            line-height: 1.8;
            word-wrap: break-word;
            color: #24292f;
        }

        .markdown-body h1 {
            @apply text-3xl md:text-4xl font-bold mb-6 pb-2 border-b border-gray-200 mt-0;
        }

        .markdown-body h2 {
            @apply text-2xl font-bold mb-4 pb-2 border-b border-gray-200 mt-12;
        }

        .markdown-body h3 {
            @apply text-xl font-bold mb-4 mt-8;
        }

        .markdown-body p {
            @apply mb-4 leading-relaxed;
        }

        .markdown-body ul, .markdown-body ol {
            @apply pl-8 mb-4;
        }

        .markdown-body ul {
            @apply list-disc;
        }

        .markdown-body ol {
            @apply list-decimal;
        }

        .markdown-body li {
            @apply mb-1;
        }

        .markdown-body li > p {
            @apply mt-4;
        }

        .markdown-body blockquote {
            @apply px-4 py-0 text-gray-500 border-l-4 border-gray-300 mb-4 bg-gray-50 rounded-r-md;
        }

        .markdown-body blockquote p {
            @apply py-2 m-0;
        }

        .markdown-body hr {
            @apply h-1 p-0 my-10 bg-gray-200 border-0;
        }

        .markdown-body a {
            @apply text-blue-600 hover:underline;
        }

        /* Qiita/Zenn style code blocks */
        .markdown-body pre {
            @apply p-4 mb-4 overflow-auto rounded-lg bg-[#282c34] text-[#abb2bf] text-sm font-mono leading-normal shadow-md !important;
        }

        .markdown-body code {
            @apply py-[0.2em] px-[0.4em] m-0 text-sm bg-[rgba(175,184,193,0.2)] rounded-md font-mono text-[#eb5757];
        }

        .markdown-body pre code {
            @apply p-0 m-0 bg-transparent rounded-none text-inherit;
        }

        .markdown-body strong {
            @apply font-semibold;
        }
        
        .markdown-body em {
            @apply italic;
        }
    </style>
    <!-- Marked.js -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <!-- Highlight.js (Atom One Dark theme for Zenn-like code blocks) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
</head>

<body class="min-h-screen py-12 px-4 sm:px-6 lg:px-8">
    <main class="max-w-4xl mx-auto glass-card p-6 sm:p-12 lg:p-16">
        <article id="content" class="markdown-body opacity-0 transition-opacity duration-700">
            <div class="flex justify-center items-center py-20">
                <div class="animate-spin rounded-full h-10 w-10 border-b-2 border-brand-600"></div>
            </div>
        </article>

        <footer class="mt-16 pt-8 border-t border-slate-200/50 text-center text-slate-500 text-sm">
            <p>Created by hirowada0923 with Agent-Ready Guidelines.</p>
        </footer>
    </main>

    <script>
        // Configure marked with highlight.js
        marked.setOptions({
            highlight: function (code, lang) {
                if (lang && hljs.getLanguage(lang)) {
                    return hljs.highlight(code, { language: lang }).value;
                }
                return hljs.highlightAuto(code).value;
            },
            breaks: true
        });

        // Fetch and render markdown
        fetch('tutorial.md')
            .then(response => {
                if (!response.ok) throw new Error('Markdown file not found');
                return response.text();
            })
            .then(text => {
                document.getElementById('content').innerHTML = marked.parse(text);
                setTimeout(() => {
                    document.getElementById('content').classList.remove('opacity-0');
                }, 100);
            })
            .catch(error => {
                document.getElementById('content').innerHTML = `
                    <p class="text-red-500 mb-4">Error loading content: ${error.message}</p>
                    <p class="text-slate-600">Please make sure the <code class="bg-red-50 text-red-700 px-1 rounded">tutorial.md</code> file exists in the repository root.</p>
                `;
                document.getElementById('content').classList.remove('opacity-0');
            });
    </script>
</body>

</html>
