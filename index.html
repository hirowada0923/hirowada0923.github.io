<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agent-Ready Environment Tutorial</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            50: '#eef2ff',
                            100: '#e0e7ff',
                            500: '#6366f1',
                            600: '#4f46e5',
                            900: '#312e81',
                        }
                    },
                    fontFamily: {
                        sans: ['"Plus Jakarta Sans"', '"Noto Sans JP"', 'sans-serif'],
                        display: ['Outfit', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style type="text/tailwindcss">
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=Outfit:wght@400;600;700&family=Plus+Jakarta+Sans:wght@400;500;600&display=swap');
        
        body {
            @apply bg-slate-50 text-slate-800 antialiased selection:bg-brand-500 selection:text-white;
            /* Soft Modern Background */
            background-image: radial-gradient(circle at top right, #eef2ff, #fdf2f8, #f8fafc);
            background-attachment: fixed;
        }

        .glass-card {
            @apply bg-white/70 backdrop-blur-md border border-white/30 shadow-xl rounded-3xl;
        }

        /* Markdown Styles */
        .markdown-body h1 { @apply text-3xl md:text-4xl font-display font-bold text-slate-900 mb-6 tracking-tight leading-tight; }
        .markdown-body h2 { @apply text-2xl font-display font-bold text-slate-800 mt-12 mb-4 border-b border-slate-200 pb-2; }
        .markdown-body h3 { @apply text-xl font-display font-semibold text-slate-800 mt-8 mb-3; }
        .markdown-body p { @apply mb-6 leading-relaxed text-slate-600; }
        .markdown-body ul { @apply list-disc list-outside ml-6 mb-6 text-slate-600 space-y-2; }
        .markdown-body ol { @apply list-decimal list-outside ml-6 mb-6 text-slate-600 space-y-2; }
        .markdown-body code { @apply bg-slate-100/80 text-brand-600 px-1.5 py-0.5 rounded-md font-mono text-sm border border-slate-200; }
        .markdown-body pre { @apply bg-[#1e293b] text-slate-50 p-6 rounded-2xl overflow-x-auto mb-6 shadow-inner; }
        .markdown-body pre code { @apply bg-transparent text-inherit p-0 border-none; }
        .markdown-body blockquote { @apply border-l-4 border-brand-500 bg-brand-50/50 pl-4 py-3 pr-4 rounded-r-xl my-6 text-slate-700 italic border border-brand-100 border-l-brand-500; }
        .markdown-body hr { @apply border-slate-200 my-10; }
        .markdown-body a { @apply text-brand-600 hover:text-brand-500 underline underline-offset-4 decoration-brand-200 hover:decoration-brand-500 transition-colors; }
    </style>
    <!-- Marked.js -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <!-- Highlight.js -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
</head>
<body class="min-h-screen py-12 px-4 sm:px-6 lg:px-8">
    <main class="max-w-4xl mx-auto glass-card p-6 sm:p-12 lg:p-16">
        <header class="mb-10 text-center">
            <div class="inline-flex items-center justify-center space-x-2 bg-white/60 px-4 py-1.5 rounded-full border border-brand-100 shadow-sm mb-6">
                <span class="w-2 h-2 rounded-full bg-brand-500 animate-pulse"></span>
                <span class="text-sm font-medium text-brand-900 tracking-wide">Luminous Clarity System</span>
            </div>
        </header>
        
        <article id="content" class="markdown-body opacity-0 transition-opacity duration-700">
            <div class="flex justify-center items-center py-20">
                <div class="animate-spin rounded-full h-10 w-10 border-b-2 border-brand-600"></div>
            </div>
        </article>

        <footer class="mt-16 pt-8 border-t border-slate-200/50 text-center text-slate-500 text-sm">
            <p>Created by hirowada0923 with Agent-Ready Guidelines.</p>
        </footer>
    </main>

    <script>
        // Configure marked with highlight.js
        marked.setOptions({
            highlight: function(code, lang) {
                if (lang && hljs.getLanguage(lang)) {
                    return hljs.highlight(code, { language: lang }).value;
                }
                return hljs.highlightAuto(code).value;
            },
            breaks: true
        });

        // Fetch and render markdown
        fetch('tutorial.md')
            .then(response => {
                if (!response.ok) throw new Error('Markdown file not found');
                return response.text();
            })
            .then(text => {
                document.getElementById('content').innerHTML = marked.parse(text);
                setTimeout(() => {
                    document.getElementById('content').classList.remove('opacity-0');
                }, 100);
            })
            .catch(error => {
                document.getElementById('content').innerHTML = `
                    <p class="text-red-500 mb-4">Error loading content: ${error.message}</p>
                    <p class="text-slate-600">Please make sure the <code class="bg-red-50 text-red-700 px-1 rounded">tutorial.md</code> file exists in the repository root.</p>
                `;
                document.getElementById('content').classList.remove('opacity-0');
            });
    </script>
</body>
</html>
